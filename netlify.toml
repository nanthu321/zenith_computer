[build]
command = "npm run build"
publish = "dist"

# Environment variables for the build
[build.environment]
VITE_API_BASE_URL = "https://backend-computer.onrender.com"
VITE_MOCK_MODE = "false"

# API proxy rules - forward /api/* requests to the backend
[[redirects]]
from = "/api/*"
to = "https://backend-computer.onrender.com/api/:splat"
status = 200
force = true

# SPA routing - all other requests go to index.html for client-side routing
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
